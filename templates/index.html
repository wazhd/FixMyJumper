<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixYourJumper Automated AI Coach</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="app-layout">
        <div class="feed-section">
            <h2>Live Tracking Feed</h2>
            <img src="{{ url_for('video_feed') }}" class="video-feed-frame" alt="FixMyJumper Live Feed">
        </div>

        <div class="ai-recommendation-box">
            <div class="box-header">Automated AI Coach Recommendations</div>
            <div class="box-content">
                <div id="aiTextContainer" class="ai-message"></div>
                <p id="emptyPrompt" class="empty-message">Stand in front of the camera and take a shot.The AI Coach will give you recommendations on how to fix your shooting form.</p>
                
                <audio id="audioPlayer" autoplay></audio>
            </div>
        </div>
    </div>

<script>
    let startedAnalyzing = false;
    let lastPlayedVersion = -1;
    let fetchInFlight = false;

    function playAudio(url) {
        const player = document.getElementById('audioPlayer');
        player.pause();
        player.currentTime = 0;
        player.src = url;
        player.load();
        player.play().catch(e => console.log("Audio playback error:", e));
    }

    setInterval(() => {
        fetch('/get_coach_status')
            .then(response => response.json())
            .then(statusData => {
                const textContainer = document.getElementById('aiTextContainer');
                const emptyPrompt = document.getElementById('emptyPrompt');

                if (statusData.ai_running && !startedAnalyzing) {
                    startedAnalyzing = true;

                    textContainer.innerText = "Please wait! Coach is analyzing...";
                    textContainer.style.display = 'block';
                    emptyPrompt.style.display = 'none';

                    playAudio("/get_processing_audio?t=" + Date.now());
                }

                if (!statusData.ai_running && startedAnalyzing && !fetchInFlight) {
                    startedAnalyzing = false;

                    // Ignore if we've already played this version (stale/duplicate)
                    if (statusData.shot_version <= lastPlayedVersion) {
                        return;
                    }

                    fetchInFlight = true;
                    fetch('/get_latest_feedback')
                        .then(response => response.json())
                        .then(data => {
                            if (data.feedback && data.feedback !== "" && statusData.shot_version > lastPlayedVersion) {
                                lastPlayedVersion = statusData.shot_version;
                                textContainer.innerText = data.feedback;
                                playAudio("/get_audio?t=" + Date.now());
                            }
                        })
                        .finally(() => { fetchInFlight = false; });
                }
            })
            .catch(err => console.error("Error checking status:", err));
    }, 500);
</script>

</body>
</html>
